<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Supply Tracker" />
  <meta name="theme-color" content="#F5EDD8" />
  <title>Supply Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header id="header">
    <div class="header-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="36" height="36" rx="8" fill="#9B6B5A"/>
          <circle cx="18" cy="10" r="2.8" fill="#F5EDD8"/>
          <rect x="15.2" y="15" width="5.6" height="13" rx="2.5" fill="#F5EDD8"/>
          <path d="M7 31 Q18 28.5 29 31" stroke="#8BA888" stroke-width="2.2" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <div>
        <span class="logo-text">Supply Tracker</span>
        <span class="logo-sub">Business Inventory</span>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="btn-add" aria-label="Add item">＋</button>
    </div>
  </header>

  <!-- CONTENT -->
  <main id="content">

    <!-- Notification permission banner -->
    <div class="notif-banner" id="notif-banner" style="display:none">
      <div class="notif-banner-icon">🔔</div>
      <div class="notif-banner-text">
        <div class="notif-banner-title">Enable Low-Stock Alerts</div>
        <div class="notif-banner-sub">Get notified when supplies are running low</div>
      </div>
      <div class="notif-banner-action">Allow →</div>
    </div>

    <!-- Stats -->
    <div class="inventory-header">
      <span class="section-title">Your Supplies</span>
    </div>
    <div class="stats-bar">
      <div class="stat-item ok">
        <span class="stat-value" id="stat-total">0</span>
        <span class="stat-label">Items</span>
      </div>
      <div class="stat-item warn">
        <span class="stat-value" id="stat-low">0</span>
        <span class="stat-label">Low Stock</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="stat-types">0</span>
        <span class="stat-label">Categories</span>
      </div>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="search" id="search-input" placeholder="Search supplies…" autocomplete="off" />
    </div>

    <!-- Filter chips -->
    <div class="filter-row" id="filter-row">
      <div class="chip active" data-filter="all">All</div>
    </div>

    <!-- Cards -->
    <div class="filament-list" id="filament-list">
      <div class="empty-state">
        <div class="empty-icon">📦</div>
        <div class="empty-title">No Supplies Yet</div>
        <div class="empty-sub">Tap <strong>＋</strong> to add your first item.</div>
      </div>
    </div>

  </main>
</div>

<!-- TOASTS -->
<div class="toast-container" id="toast-container"></div>

<!-- ADD / EDIT MODAL -->
<div class="modal-overlay" id="modal-add">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="modal-add-title">Add Item</span>
      <button class="modal-close" id="modal-add-close">✕</button>
    </div>
    <div class="form-body">
      <input type="hidden" id="edit-id" />

      <div class="form-field">
        <label class="form-label" for="f-name">Item Name</label>
        <input class="form-input" type="text" id="f-name" placeholder="e.g. Bubble Mailers 6x9" autocomplete="off" />
      </div>

      <div class="form-row">
        <div class="form-field">
          <label class="form-label" for="f-brand">Supplier / Brand</label>
          <input class="form-input" type="text" id="f-brand" placeholder="e.g. ULINE" autocomplete="off" />
        </div>
        <div class="form-field">
          <label class="form-label" for="f-material">Category</label>
          <select class="form-select" id="f-material">
            <option value="Packaging">Packaging</option>
            <option value="Shipping">Shipping</option>
            <option value="Labels">Labels</option>
            <option value="Tape">Tape</option>
            <option value="Boxes">Boxes</option>
            <option value="Bags">Bags</option>
            <option value="Filament">Filament</option>
            <option value="Tools">Tools</option>
            <option value="Printing">Printing</option>
            <option value="Office">Office</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>

      <div class="form-field">
        <label class="form-label">Color / Variant</label>
        <div class="color-picker-wrap">
          <input class="form-input" type="text" id="f-color-name" placeholder="e.g. White, 6x9, 100pk" autocomplete="off" />
          <div class="color-preview" id="color-preview-box">
            <input type="color" id="f-color-hex" value="#9B6B5A" />
          </div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-field">
          <label class="form-label" for="f-qty">Current Qty</label>
          <input class="form-input" type="number" id="f-qty" placeholder="0" min="0" inputmode="numeric" />
        </div>
        <div class="form-field">
          <label class="form-label" for="f-min">Minimum Stock</label>
          <input class="form-input" type="number" id="f-min" placeholder="5" min="0" inputmode="numeric" />
        </div>
      </div>

      <div class="form-field">
        <label class="form-label" for="f-unit">Unit</label>
        <select class="form-select" id="f-unit">
          <option value="units">Units</option>
          <option value="rolls">Rolls</option>
          <option value="packs">Packs</option>
          <option value="boxes">Boxes</option>
          <option value="bags">Bags</option>
          <option value="sheets">Sheets</option>
          <option value="spools">Spools</option>
          <option value="lbs">Lbs</option>
          <option value="ft">Ft</option>
          <option value="pairs">Pairs</option>
        </select>
      </div>

      <div class="form-field">
        <label class="form-label" for="f-link">Buy Link (URL)</label>
        <input class="form-input" type="url" id="f-link" placeholder="https://amazon.com/…" autocomplete="off" />
      </div>

      <div class="form-field">
        <label class="form-label" for="f-notes">Notes</label>
        <input class="form-input" type="text" id="f-notes" placeholder="Optional notes…" autocomplete="off" />
      </div>

      <button class="form-submit" id="form-submit-btn">Add Item</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
