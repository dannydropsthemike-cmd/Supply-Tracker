<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FilaVault" />
  <meta name="theme-color" content="#0a0a0f" />

  <title>Filament Vault</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />

  <!-- QR Code Generation (offline-capable via SW cache) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <!-- QR Code Scanning -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>

<div id="app">

  <!-- ═══ HEADER ══════════════════════════════════════════════ -->
  <header id="header">
    <div class="header-logo">
      <div class="logo-icon">🧵</div>
      <div>
        <span class="logo-text">FilaVault</span>
        <span class="logo-sub">Filament Tracker</span>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="btn-add" title="Add Filament" aria-label="Add filament">＋</button>
      <button class="icon-btn" id="btn-alerts" title="Alerts" aria-label="View alerts">🔔</button>
    </div>
  </header>

  <!-- ═══ NAV TABS ════════════════════════════════════════════ -->
  <nav id="nav">
    <div class="nav-tab active" data-view="inventory">
      <span class="tab-icon">📦</span>
      Inventory
    </div>
    <div class="nav-tab" data-view="scan">
      <span class="tab-icon">📷</span>
      Scan
    </div>
    <div class="nav-tab" data-view="alerts">
      <span class="tab-icon">⚠️</span>
      Alerts
    </div>
  </nav>

  <!-- ═══ MAIN CONTENT ════════════════════════════════════════ -->
  <main id="content">

    <!-- ─── INVENTORY VIEW ─────────────────────────────────── -->
    <section id="view-inventory" class="view active">

      <!-- Stats Bar -->
      <div class="inventory-header">
        <span class="section-title">Stock Overview</span>
      </div>
      <div class="stats-bar">
        <div class="stat-item ok">
          <span class="stat-value" id="stat-total">0</span>
          <span class="stat-label">Total</span>
        </div>
        <div class="stat-item warn">
          <span class="stat-value" id="stat-low">0</span>
          <span class="stat-label">Low Stock</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="stat-types">0</span>
          <span class="stat-label">Materials</span>
        </div>
      </div>

      <!-- Search -->
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="search" id="search-input" placeholder="Search filaments…" autocomplete="off" />
      </div>

      <!-- Filter Chips -->
      <div class="filter-row" id="filter-row">
        <div class="chip active" data-filter="all">All</div>
        <!-- Material chips injected dynamically -->
      </div>

      <!-- Filament Cards -->
      <div class="filament-list" id="filament-list">
        <div class="empty-state">
          <div class="empty-icon">🧵</div>
          <div class="empty-title">No Filaments Yet</div>
          <div class="empty-sub">Tap the <strong>＋</strong> button to add your first filament to the vault.</div>
        </div>
      </div>
    </section>

    <!-- ─── SCAN VIEW ───────────────────────────────────────── -->
    <section id="view-scan" class="view">
      <div class="scan-viewport">
        <!-- html5-qrcode mounts here -->
        <div id="qr-reader"></div>
        <!-- Visual overlay -->
        <div class="scan-overlay" id="scan-overlay">
          <div class="scan-frame">
            <div class="scan-corner tl"></div>
            <div class="scan-corner tr"></div>
            <div class="scan-corner bl"></div>
            <div class="scan-corner br"></div>
            <div class="scan-line"></div>
          </div>
        </div>
        <div class="scan-hint">
          <p>ALIGN QR CODE WITHIN FRAME</p>
        </div>
      </div>

      <!-- Scanned result panel -->
      <div class="scan-result-panel" id="scan-result-panel">
        <div class="scan-result-name" id="scan-result-name">—</div>
        <div class="scan-result-meta" id="scan-result-meta">—</div>

        <div class="qty-adjuster">
          <button class="qty-btn" id="scan-qty-minus">−</button>
          <div>
            <div class="qty-display" id="scan-qty-display">0</div>
            <div class="qty-unit">spools</div>
          </div>
          <button class="qty-btn" id="scan-qty-plus">＋</button>
        </div>

        <div class="scan-actions">
          <button class="btn" id="scan-cancel-btn">Cancel</button>
          <button class="btn primary" id="scan-save-btn">Save</button>
        </div>
      </div>
    </section>

    <!-- ─── ALERTS VIEW ─────────────────────────────────────── -->
    <section id="view-alerts" class="view">
      <div class="inventory-header">
        <span class="section-title">Low Stock Alerts</span>
      </div>
      <div class="filament-list" id="alerts-list"></div>
    </section>

  </main>
</div><!-- #app -->

<!-- ═══ TOAST CONTAINER ════════════════════════════════════ -->
<div class="toast-container" id="toast-container"></div>

<!-- ═══ ADD / EDIT FILAMENT MODAL ══════════════════════════ -->
<div class="modal-overlay" id="modal-add">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="modal-add-title">Add Filament</span>
      <button class="modal-close" id="modal-add-close">✕</button>
    </div>
    <div class="form-body">
      <input type="hidden" id="edit-id" />

      <div class="form-field">
        <label class="form-label" for="f-name">Name / Label</label>
        <input class="form-input" type="text" id="f-name" placeholder="e.g. Sunset Orange PLA" autocomplete="off" />
      </div>

      <div class="form-row">
        <div class="form-field">
          <label class="form-label" for="f-brand">Brand</label>
          <input class="form-input" type="text" id="f-brand" placeholder="e.g. Hatchbox" autocomplete="off" />
        </div>
        <div class="form-field">
          <label class="form-label" for="f-material">Material</label>
          <select class="form-select" id="f-material">
            <option value="PLA">PLA</option>
            <option value="ABS">ABS</option>
            <option value="PETG">PETG</option>
            <option value="TPU">TPU</option>
            <option value="ASA">ASA</option>
            <option value="Nylon">Nylon</option>
            <option value="Resin">Resin</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>

      <div class="form-field">
        <label class="form-label">Color</label>
        <div class="color-picker-wrap">
          <input class="form-input" type="text" id="f-color-name" placeholder="Color name (e.g. Orange)" autocomplete="off" />
          <div class="color-preview">
            <input type="color" id="f-color-hex" value="#ff6b35" title="Pick color" />
          </div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-field">
          <label class="form-label" for="f-qty">Current Spools</label>
          <input class="form-input" type="number" id="f-qty" placeholder="0" min="0" inputmode="numeric" />
        </div>
        <div class="form-field">
          <label class="form-label" for="f-min">Minimum Stock</label>
          <input class="form-input" type="number" id="f-min" placeholder="2" min="0" inputmode="numeric" />
        </div>
      </div>

      <div class="form-field">
        <label class="form-label" for="f-link">Buy Link (URL)</label>
        <input class="form-input" type="url" id="f-link" placeholder="https://amazon.com/…" autocomplete="off" />
      </div>

      <div class="form-field">
        <label class="form-label" for="f-notes">Notes</label>
        <input class="form-input" type="text" id="f-notes" placeholder="Optional notes…" autocomplete="off" />
      </div>

      <button class="form-submit" id="form-submit-btn">Add to Vault</button>
    </div>
  </div>
</div>

<!-- ═══ QR CODE MODAL ══════════════════════════════════════ -->
<div class="modal-overlay" id="modal-qr">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">QR Code</span>
      <button class="modal-close" id="modal-qr-close">✕</button>
    </div>
    <div class="qr-modal-content">
      <div id="qr-display-canvas"></div>
      <div class="qr-filament-name" id="qr-display-name">—</div>
      <div class="qr-filament-meta" id="qr-display-meta">—</div>
      <div class="qr-actions">
        <button class="btn" id="qr-download-btn">📥 Download</button>
        <button class="btn primary" id="qr-done-btn">Done</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══ DETAIL / EDIT MODAL ════════════════════════════════ -->
<div class="modal-overlay" id="modal-detail">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="detail-color-bar" id="detail-color-bar"></div>
    <div class="modal-header">
      <span class="modal-title" id="detail-modal-title">Details</span>
      <button class="modal-close" id="modal-detail-close">✕</button>
    </div>
    <div id="detail-content"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
